name: CI

on:
  push:
    branches: [main, master, test-dev]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Test: build with ENABLE_TESTS=ON and run ctest.
  #
  # Matrix dimensions:
  #   os            — target distribution
  #   xrootd_channel — which XRootD repo channel to install from
  #
  # To test against additional XRootD channels (e.g. a pre-release), add an
  # entry to the matrix below with the appropriate xrootd_repo_url.
  # ---------------------------------------------------------------------------
  test:
    name: Test / ${{ matrix.os }} / xrootd-${{ matrix.xrootd_channel }}
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: rocky8
            image: rockylinux:8
            crb: powertools
            xrootd_channel: stable
            xrootd_repo_url: https://xrootd.web.cern.ch/xrootd.repo
          - os: rocky9
            image: rockylinux:9
            crb: crb
            xrootd_channel: stable
            xrootd_repo_url: https://xrootd.web.cern.ch/xrootd.repo
          # Uncomment to test against the XRootD testing/pre-release channel:
          # - os: rocky9
          #   image: rockylinux:9
          #   crb: crb
          #   xrootd_channel: testing
          #   xrootd_repo_url: https://xrootd.web.cern.ch/xrootd-testing.repo

    steps:
      - name: Install git
        run: dnf -y install git

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: ./.github/actions/setup-build
        with:
          crb: ${{ matrix.crb }}
          xrootd_repo_url: ${{ matrix.xrootd_repo_url }}

      # Cache the GoogleTest FetchContent download (v1.14.0, keyed per OS).
      # CMake skips the fetch when build/_deps is already populated.
      - name: Cache GoogleTest
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: gtest-v1.14.0-${{ matrix.os }}

      - name: Build and test
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_TESTS=ON
          cmake --build build -j$(nproc)
          ctest --test-dir build --output-on-failure -j$(nproc)

      - name: Upload libraries
        uses: actions/upload-artifact@v4
        with:
          name: libs-${{ matrix.os }}-xrootd-${{ matrix.xrootd_channel }}
          path: build/**/*.so
          retention-days: 7

  # ---------------------------------------------------------------------------
  # RPM: build binary RPMs from a source RPM.
  # Only runs against the stable XRootD channel.
  # Runs after all test matrix entries pass.
  # ---------------------------------------------------------------------------
  rpm:
    name: RPM / ${{ matrix.os }}
    runs-on: ubuntu-latest
    needs: [test]
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: rocky8
            image: rockylinux:8
            crb: powertools
            xrootd_repo_url: https://xrootd.web.cern.ch/xrootd.repo
          - os: rocky9
            image: rockylinux:9
            crb: crb
            xrootd_repo_url: https://xrootd.web.cern.ch/xrootd.repo

    steps:
      - name: Install git
        run: dnf -y install git

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: ./.github/actions/setup-build
        with:
          crb: ${{ matrix.crb }}
          xrootd_repo_url: ${{ matrix.xrootd_repo_url }}
          rpm_tools: 'true'

      - name: Set up RPM tree
        run: rpmdev-setuptree

      - name: Build SRPM
        run: |
          mkdir -p /tmp/srpms
          cd packaging
          bash makesrpm.sh --source ../ --output /tmp/srpms

      - name: Install binary RPM build dependencies
        run: dnf builddep -y /tmp/srpms/xrootd-blackhole-*.src.rpm

      - name: Build binary RPMs
        run: rpmbuild --rebuild /tmp/srpms/xrootd-blackhole-*.src.rpm

      - name: Collect RPMs
        run: |
          mkdir -p /tmp/rpms
          find "$HOME/rpmbuild/RPMS" -name '*.rpm' | sort | tee /tmp/rpms-list.txt
          xargs -a /tmp/rpms-list.txt cp -t /tmp/rpms/

      - name: Upload RPMs
        uses: actions/upload-artifact@v4
        with:
          name: rpms-${{ matrix.os }}
          path: /tmp/rpms/*.rpm
          retention-days: 30
