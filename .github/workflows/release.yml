name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  # ---------------------------------------------------------------------------
  # Build binary RPMs for each supported platform and attach them to the
  # GitHub Release created by the tag push.
  # ---------------------------------------------------------------------------
  rpm:
    name: RPM / ${{ matrix.os }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: rocky8
            image: rockylinux:8
            crb: powertools
            xrootd_repo_url: https://xrootd.web.cern.ch/xrootd.repo
          - os: rocky9
            image: rockylinux:9
            crb: crb
            xrootd_repo_url: https://xrootd.web.cern.ch/xrootd.repo

    steps:
      - name: Install git
        run: dnf -y install git

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: ./.github/actions/setup-build
        with:
          crb: ${{ matrix.crb }}
          xrootd_repo_url: ${{ matrix.xrootd_repo_url }}
          rpm_tools: 'true'

      - name: Set up RPM tree
        run: rpmdev-setuptree

      - name: Build SRPM
        run: |
          mkdir -p /tmp/srpms
          cd packaging
          bash makesrpm.sh --source ../ --output /tmp/srpms

      - name: Install binary RPM build dependencies
        run: dnf builddep -y /tmp/srpms/xrootd-blackhole-*.src.rpm

      - name: Build binary RPMs
        run: rpmbuild --rebuild /tmp/srpms/xrootd-blackhole-*.src.rpm

      - name: Collect RPMs
        run: |
          mkdir -p /tmp/rpms
          find "$HOME/rpmbuild/RPMS" -name '*.rpm' | sort | tee /tmp/rpms-list.txt
          xargs -a /tmp/rpms-list.txt cp -t /tmp/rpms/
          cp /tmp/srpms/xrootd-blackhole-*.src.rpm /tmp/rpms/

      - name: Upload RPMs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/rpms/*.rpm
          fail_on_unmatched_files: true
