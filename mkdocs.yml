site_name: XrdBlackhole
site_description: XRootD blackhole storage backend for benchmarking and integration testing
site_url: https://snafus.github.io/XrdBlackhole/
repo_url: https://github.com/snafus/XrdBlackhole
repo_name: snafus/XrdBlackhole
edit_uri: edit/main/

docs_dir: .

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight

nav:
  - Home: docs/index.md
  - Configuration: docs/configuration.md
  - Architecture: docs/ARCHITECTURE.md
  - Roadmap: docs/ROADMAP.md
  - Changelog: CHANGELOG.md

exclude_docs: |
  ReleaseNotes.txt
  PreReleaseNotes.txt

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
