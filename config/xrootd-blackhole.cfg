# XrdBlackhole — minimal XRootD server configuration
#
# Writes are silently discarded; reads return zeros.
# See README.md for full configuration options and examples.

all.role server
xrd.port 1094

# Enable HTTP(S) on the same port as the native XRootD protocol.
# XrdHttp multiplexes both protocols on port 1094.
# Clients can use xroots://, https://, or davs:// URIs.
xrd.protocol XrdHttp:1094 libXrdHttp.so

# Prometheus metrics endpoint — served at GET http://<host>:1094/metrics
# Requires xrd.protocol XrdHttp above.
http.exthandler bhmetrics /usr/lib64/libXrdBlackholeMetrics.so

# Load the blackhole OSS plugin.
# Only one ofs.osslib directive is permitted (no stacking).
ofs.osslib /usr/lib64/libXrdBlackhole.so

# Optional: throttle apparent write speed to N MiB/s.
#blackhole.writespeedMiBps 1024

# Optional: pre-seed the in-memory filesystem with fixed-size zero files
# for read benchmarking. Files are created under <path> at startup:
#   <path>/testfile_zeros_1MiB
#   <path>/testfile_zeros_1GiB
#   <path>/testfile_zeros_10GiB
#blackhole.defaultspath /test

# Optional: create individual pre-seeded files for read benchmarking.
# Size supports K/M/G/T suffixes.  count=N expands a printf pattern into N
# files.  type=zeros (default) or type=random for deterministic pseudo-random.
#blackhole.seedfile /data/4GiB.root    4G
#blackhole.seedfile /data/f_%04d.root  1G  count=100
#blackhole.seedfile /data/rand.root    1G  type=random

# Export the entire namespace read/write.
all.export / rw
